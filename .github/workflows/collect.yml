name: Samla schacknyheter
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installera beroenden
        run: pip install requests beautifulsoup4 python-dotenv anthropic python-dateutil lxml
      - name: Skapa .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "WP_URL=${{ secrets.WP_URL }}" >> .env
          echo "WP_USER=${{ secrets.WP_USER }}" >> .env
          echo "WP_PASS=${{ secrets.WP_PASS }}" >> .env
          echo "GAMBIT_TOKEN=${{ secrets.GAMBIT_TOKEN }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
      - name: Kör insamling
        id: collect
        run: python gambit_news.py --collect
      - name: Spara filer till repot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json pending_approval.json || true
          git diff --staged --quiet || git commit -m "Uppdatera artiklar [skip ci]"
          git push || true
      - name: Trigga WordPress-import
        run: |
          curl -s -X POST \
            --max-time 60 \
            --connect-timeout 15 \
            -H "X-Gambit-Token: ${{ secrets.GAMBIT_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://gambit.se/wp-json/gambit/v1/fetch" \
            || echo "⚠️ WordPress-import timeout – artiklarna är ändå sparade i repot"
      - name: Skicka fellarm vid misslyckande
        if: failure()
        continue-on-error: true
        run: |
          python3 -c "
          import smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('GitHub Actions-körningen för gambit.se misslyckades. Kolla loggen: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          msg['Subject'] = '⚠️ Gambit nyhetsinsamling misslyckades'
          msg['From'] = '${{ secrets.EMAIL_FROM }}'
          msg['To'] = '${{ secrets.EMAIL_TO }}'
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login('${{ secrets.EMAIL_FROM }}', '${{ secrets.EMAIL_PASSWORD }}')
              s.send_message(msg)
          print('Fellarm skickat')
          "
