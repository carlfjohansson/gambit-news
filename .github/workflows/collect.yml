name: Samla schacknyheter
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installera beroenden
        run: pip install requests beautifulsoup4 python-dotenv anthropic python-dateutil lxml
      - name: Skapa .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "WP_URL=${{ secrets.WP_URL }}" >> .env
          echo "WP_USER=${{ secrets.WP_USER }}" >> .env
          echo "WP_PASS=${{ secrets.WP_PASS }}" >> .env
          echo "GAMBIT_TOKEN=${{ secrets.GAMBIT_TOKEN }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
      - name: Kör insamling
        run: python gambit_news.py --collect
      - name: Spara seen_articles till repot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json || true
          git diff --staged --quiet || git commit -m "Uppdatera seen_articles [skip ci]"
          git push || true
      - name: Spara resultat
        uses: actions/upload-artifact@v4
        with:
          name: pending-approval
          path: pending_approval.json
          if-no-files-found: ignore
